AWSTemplateFormatVersion: '2010-09-09'
Description: Governance baseline with secure S3 bucket and least-privilege IAM role

Parameters:
  ProjectName:
    Type: String
    Default: governance-baseline

  AuditPrincipalArn:
    Type: String
    Description: ARN of the trusted principal that can assume the audit role

Resources:
  GovernanceBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-bucket'
        - Key: Purpose
          Value: governance
        - Key: ManagedBy
          Value: CloudFormation

  GovernanceBucketReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${ProjectName}-s3-readonly'
      Description: Least-privilege read-only access to governance bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !GetAtt GovernanceBucket.Arn
          - Sid: ReadObjects
            Effect: Allow
            Action:
              - s3:GetObject
            Resource: !Sub '${GovernanceBucket.Arn}/*'

  GovernanceAuditRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-audit-role'
      Description: Read-only audit role for governance bucket
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowTrustedPrincipalAssumeRole
            Effect: Allow
            Principal:
              AWS: !Ref AuditPrincipalArn
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref GovernanceBucketReadPolicy
      Tags:
        - Key: Purpose
          Value: governance-audit
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  BucketName:
    Description: Name of the governance bucket
    Value: !Ref GovernanceBucket

  BucketArn:
    Description: ARN of the governance bucket
    Value: !GetAtt GovernanceBucket.Arn

  AuditRoleArn:
    Description: ARN of the audit role
    Value: !GetAtt GovernanceAuditRole.Arn